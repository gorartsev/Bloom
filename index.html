<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>BLOOM Journal</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="BLOOM">
<meta name="theme-color" content="#F6EFEE">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }
  html, body {
    background: #F6EFEE;
    color: #2B1F26;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
    line-height: 1.4;
    font-size: 15px;
  }
  body {
    min-height: 100vh;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }
  button { font-family: inherit; border: none; cursor: pointer; background: none; color: inherit; font-size: inherit; }
  input, textarea { font-family: inherit; font-size: inherit; color: inherit; }
  h1, h2, h3, h4 { font-weight: 700; line-height: 1.2; letter-spacing: -0.02em; }
  ::-webkit-scrollbar { display: none; }
  input[type="date"], input[type="time"] { -webkit-appearance: none; appearance: none; min-height: 48px; }
  input[type="number"] { -webkit-appearance: none; appearance: none; }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  textarea { resize: none; }
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    background: transparent;
    width: 100%;
    height: 32px;
  }
  input[type="range"]::-webkit-slider-runnable-track {
    height: 8px;
    background: linear-gradient(to right, #EFD5E3, #E396DF);
    border-radius: 4px;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #FFFFFF;
    border: 3px solid #E396DF;
    margin-top: -10px;
    box-shadow: 0 2px 8px rgba(227,150,223,0.3);
    cursor: pointer;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ═══ DESIGN TOKENS ══════════════════════════════════════════════════════════
const C = {
  bg: "#F6EFEE",
  card: "#FFFFFF",
  cardDim: "#FBF4F3",
  text: "#2B1F26",
  textDim: "#8E7A84",
  textSoft: "#C4AEBA",
  border: "#E2B6CF",
  borderSoft: "#EFD5E3",
  accent: "#E396DF",
  accentDark: "#C872C4",
  accentSoft: "#F8DCEF",
  success: "#9BC791",
};

const SP = { xs: 4, sm: 8, md: 12, lg: 16, xl: 20, xxl: 24, xxxl: 32 };

// ═══ STORAGE ════════════════════════════════════════════════════════════════
const storage = {
  get: (k) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
};

// ═══ HELPERS ═══════════════════════════════════════════════════════════════
const MONTHS = ["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
const MONTHS_SHORT = ["янв","фев","мар","апр","май","июн","июл","авг","сен","окт","ноя","дек"];
const DAYS_FULL = ["Воскресенье","Понедельник","Вторник","Среда","Четверг","Пятница","Суббота"];
const DAYS_SHORT = ["Вс","Пн","Вт","Ср","Чт","Пт","Сб"];

const dateKey = (d) => {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
};
const parseKey = (k) => {
  const [y,m,d] = k.split('-').map(Number);
  return new Date(y, m-1, d);
};
const sameDay = (a, b) => a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();

const CATEGORIES = [
  { id: "fitness", name: "Фитнес", emoji: "💪" },
  { id: "run", name: "Бег", emoji: "🏃‍♀️" },
];

// Mood scale 1-5 with emoji and descriptive label
const MOOD_LABELS = {
  1: { emoji: "😔", label: "Грустно" },
  2: { emoji: "😐", label: "Так себе" },
  3: { emoji: "🙂", label: "Нормально" },
  4: { emoji: "😊", label: "Хорошо" },
  5: { emoji: "🥰", label: "Супер" },
};

// Motivational quotes (rotate daily based on day of year)
const QUOTES = [
  "Ты сильнее, чем думаешь 💪",
  "Каждый шаг приближает к цели 🌸",
  "Сегодня ты на шаг ближе к себе лучшей ✨",
  "Красота в постоянстве, а не в совершенстве 💗",
  "Ты уже делаешь больше, чем вчерашняя ты 🌷",
  "Твоё тело благодарит тебя за заботу 💖",
  "Маленькие шаги → большие перемены 🦋",
  "Гордись собой каждый день 🌺",
  "Движение — это любовь к себе 💕",
  "Ты достойна быть здоровой и счастливой 🌹",
  "Верь в себя — ты способна на всё 🌟",
  "Сила не в весе, а в характере 💪",
  "Твоя дисциплина вдохновляет ✨",
  "Лучшая версия себя ждёт тебя впереди 🌸",
  "Не сдавайся, ты уже прошла так далеко 💗",
  "Каждая тренировка делает тебя крепче 🌷",
  "Ты — цветок, который расцветает с каждым днём 🌺",
  "Здоровое тело — счастливая жизнь 💖",
  "Ты — своя главная поддержка 🦋",
  "Один день без движения — нормально. Два — уже сложнее 💕",
  "Улыбайся, ты делаешь всё правильно 😊",
  "Твоё упорство — это суперсила 🌟",
  "Тренировка = свидание с собой 💗",
  "Ты растёшь и это видно 🌸",
  "Гордись даже маленькими победами 🌹",
  "Сегодняшний пот — завтрашняя гордость 💪",
  "Ты — не обязана быть идеальной, просто стараться 💖",
  "Движение = энергия = радость ✨",
  "Никто не делает это лучше, чем ты сама 🌺",
  "Продолжай — и увидишь, как сильно изменишься 🦋",
  "Ты красивая и сильная одновременно 💕",
];
const getTodayQuote = () => {
  const d = new Date();
  const dayOfYear = Math.floor((d - new Date(d.getFullYear(), 0, 0)) / 86400000);
  return QUOTES[dayOfYear % QUOTES.length];
};

// ═══ ICONS ═══════════════════════════════════════════════════════════════════
const Icon = ({ name, size = 20, color = "currentColor", stroke = 2 }) => {
  const paths = {
    back: <><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></>,
    plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
    check: <polyline points="20 6 9 17 4 12"/>,
    chevronL: <polyline points="15 18 9 12 15 6"/>,
    chevronR: <polyline points="9 18 15 12 9 6"/>,
    close: <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
    trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14H7L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></>,
    trending: <><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></>,
    scale: <><path d="M12 3v18"/><path d="M3 12h18"/><circle cx="12" cy="12" r="9"/></>,
    edit: <><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></>,
  };
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round" style={{display:"block"}}>
      {paths[name]}
    </svg>
  );
};

// ═══ APP ═════════════════════════════════════════════════════════════════════
function App() {
  const [state, setState] = useState(() => storage.get("bloom") || {
    name: null,
    workouts: {},    // { "2026-04-18": [{...}] }
    moods: {},       // { "2026-04-18": 4 }
    weights: {},     // { "2026-04-18": 58.5 }
  });
  const [view, setView] = useState("home");
  const [month, setMonth] = useState(() => {
    const d = new Date();
    return { y: d.getFullYear(), m: d.getMonth() };
  });
  const [selectedDate, setSelectedDate] = useState(null);
  const [editingWorkout, setEditingWorkout] = useState(null);
  const [editingWeight, setEditingWeight] = useState(null);
  const [editingMood, setEditingMood] = useState(null);

  const save = (s) => { setState(s); storage.set("bloom", s); };

  const saveWorkout = (dateK, workout) => {
    const dayWorkouts = state.workouts[dateK] || [];
    let updated;
    if (workout.id) {
      updated = dayWorkouts.map(w => w.id === workout.id ? workout : w);
    } else {
      updated = [...dayWorkouts, { ...workout, id: Date.now().toString() }];
    }
    save({ ...state, workouts: { ...state.workouts, [dateK]: updated } });
  };

  const deleteWorkout = (dateK, wid) => {
    const dayWorkouts = (state.workouts[dateK] || []).filter(w => w.id !== wid);
    const newWorkouts = { ...state.workouts };
    if (dayWorkouts.length === 0) delete newWorkouts[dateK];
    else newWorkouts[dateK] = dayWorkouts;
    save({ ...state, workouts: newWorkouts });
  };

  const saveMood = (dateK, moodValue) => {
    const newMoods = { ...state.moods };
    if (moodValue === null) delete newMoods[dateK];
    else newMoods[dateK] = moodValue;
    save({ ...state, moods: newMoods });
  };

  const saveWeight = (dateK, weight) => {
    const newWeights = { ...state.weights };
    if (weight === null || weight === "") delete newWeights[dateK];
    else newWeights[dateK] = parseFloat(weight);
    save({ ...state, weights: newWeights });
  };

  if (!state.name) {
    return <StartScreen onStart={(name) => save({ ...state, name })} />;
  }

  const todayKey = dateKey(new Date());
  const todayWorkouts = state.workouts[todayKey] || [];
  const todayMood = state.moods[todayKey];
  const todayWeight = state.weights[todayKey];

  // ── MODALS ──
  if (editingWorkout !== null) {
    return (
      <WorkoutForm
        workout={editingWorkout.workout}
        date={editingWorkout.date}
        onSave={(w) => { saveWorkout(dateKey(editingWorkout.date), w); setEditingWorkout(null); }}
        onCancel={() => setEditingWorkout(null)}
        onDelete={editingWorkout.workout.id ? () => { deleteWorkout(dateKey(editingWorkout.date), editingWorkout.workout.id); setEditingWorkout(null); } : null}
      />
    );
  }

  if (editingWeight !== null) {
    return (
      <WeightForm
        date={editingWeight}
        currentValue={state.weights[dateKey(editingWeight)]}
        onSave={(v) => { saveWeight(dateKey(editingWeight), v); setEditingWeight(null); }}
        onCancel={() => setEditingWeight(null)}
        onDelete={state.weights[dateKey(editingWeight)] ? () => { saveWeight(dateKey(editingWeight), null); setEditingWeight(null); } : null}
      />
    );
  }

  if (editingMood !== null) {
    return (
      <MoodForm
        date={editingMood}
        currentValue={state.moods[dateKey(editingMood)]}
        onSave={(v) => { saveMood(dateKey(editingMood), v); setEditingMood(null); }}
        onCancel={() => setEditingMood(null)}
        onDelete={state.moods[dateKey(editingMood)] ? () => { saveMood(dateKey(editingMood), null); setEditingMood(null); } : null}
      />
    );
  }

  // Stats
  const allWorkouts = Object.values(state.workouts).flat();
  const totalCount = allWorkouts.length;

  const calculateStreak = () => {
    if (totalCount === 0) return 0;
    let streak = 0;
    const today = new Date();
    today.setHours(0,0,0,0);
    for (let i = 0; i < 365; i++) {
      const d = new Date(today);
      d.setDate(today.getDate() - i);
      const k = dateKey(d);
      if (state.workouts[k] && state.workouts[k].length > 0) {
        streak++;
      } else if (i > 0) {
        break;
      } else {
        continue;
      }
    }
    return streak;
  };
  const streak = calculateStreak();

  const thisMonth = Object.keys(state.workouts).filter(k => {
    const d = parseKey(k);
    return d.getFullYear() === month.y && d.getMonth() === month.m;
  }).reduce((acc, k) => acc + state.workouts[k].length, 0);

  // Weight stats
  const weightEntries = Object.entries(state.weights).sort((a,b) => a[0].localeCompare(b[0]));
  const latestWeight = weightEntries.length > 0 ? weightEntries[weightEntries.length - 1] : null;

  // ── DAY DETAIL ──
  if (view === "day" && selectedDate) {
    const dk = dateKey(selectedDate);
    const workouts = state.workouts[dk] || [];
    const dayMood = state.moods[dk];
    const dayWeight = state.weights[dk];
    const isToday = sameDay(selectedDate, new Date());

    return (
      <div style={sc}>
        <PageHeader
          onBack={() => { setView("home"); setSelectedDate(null); }}
          center={
            <div>
              <div style={S.headLabel}>{isToday ? "Сегодня" : DAYS_FULL[selectedDate.getDay()]}</div>
              <div style={S.headSub}>{selectedDate.getDate()} {MONTHS[selectedDate.getMonth()].toLowerCase()}</div>
            </div>
          }
        />

        <div style={{padding:`${SP.md}px ${SP.lg}px ${SP.xl}px`}}>
          {/* Mood + Weight row */}
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:SP.sm, marginBottom:SP.md}}>
            <button onClick={() => setEditingMood(selectedDate)}
              style={{...S.miniCard, alignItems:"center", textAlign:"center"}}>
              <div style={{fontSize:10, color:C.textDim, textTransform:"uppercase", letterSpacing:0.8, fontWeight:700}}>
                Настроение
              </div>
              {dayMood ? (
                <>
                  <div style={{fontSize:32, lineHeight:1}}>{MOOD_LABELS[dayMood].emoji}</div>
                  <div style={{fontSize:12, color:C.text, fontWeight:600}}>{MOOD_LABELS[dayMood].label}</div>
                </>
              ) : (
                <>
                  <div style={{fontSize:24, lineHeight:1, opacity:0.3}}>🙂</div>
                  <div style={{fontSize:12, color:C.textSoft, fontWeight:500}}>Отметить</div>
                </>
              )}
            </button>

            <button onClick={() => setEditingWeight(selectedDate)}
              style={{...S.miniCard, alignItems:"center", textAlign:"center"}}>
              <div style={{fontSize:10, color:C.textDim, textTransform:"uppercase", letterSpacing:0.8, fontWeight:700}}>
                Вес
              </div>
              {dayWeight ? (
                <>
                  <div style={{fontSize:24, fontWeight:800, color:C.text, lineHeight:1, fontVariantNumeric:"tabular-nums"}}>
                    {dayWeight}
                  </div>
                  <div style={{fontSize:11, color:C.textDim, fontWeight:600}}>кг</div>
                </>
              ) : (
                <>
                  <div style={{fontSize:24, lineHeight:1, opacity:0.3}}>⚖️</div>
                  <div style={{fontSize:12, color:C.textSoft, fontWeight:500}}>Записать</div>
                </>
              )}
            </button>
          </div>

          <div style={{fontSize:11, color:C.textDim, textTransform:"uppercase", letterSpacing:1.2, fontWeight:700, marginBottom:SP.sm, marginTop:SP.md, paddingLeft:4}}>
            Тренировки
          </div>

          {workouts.length === 0 ? (
            <div style={{
              padding:`${SP.xxl}px ${SP.lg}px`,
              textAlign:"center",
              background:C.card,
              border:`1px dashed ${C.border}`,
              borderRadius:16
            }}>
              <div style={{fontSize:36, marginBottom:SP.sm}}>🌸</div>
              <div style={{fontSize:14, fontWeight:600, color:C.text, marginBottom:4}}>Пока пусто</div>
              <div style={{fontSize:12, color:C.textDim}}>
                Добавь тренировку ниже
              </div>
            </div>
          ) : (
            <div style={{display:"flex", flexDirection:"column", gap:SP.sm}}>
              {workouts.map(w => (
                <WorkoutCard key={w.id} workout={w}
                  onClick={() => setEditingWorkout({ workout: w, date: selectedDate })}/>
              ))}
            </div>
          )}

          <button
            onClick={() => setEditingWorkout({ workout: {}, date: selectedDate })}
            style={{
              width:"100%",
              marginTop:SP.md,
              background:C.accent,
              color:"#fff",
              padding:"16px",
              borderRadius:14,
              fontSize:15,
              fontWeight:700,
              letterSpacing:0.2,
              display:"flex",
              alignItems:"center",
              justifyContent:"center",
              gap:8,
              boxShadow:`0 4px 12px ${C.accentSoft}`
            }}>
            <Icon name="plus" size={18} color="#fff" stroke={2.5}/>
            Добавить тренировку
          </button>
        </div>
      </div>
    );
  }

  // ── WEIGHT TRACKER VIEW ──
  if (view === "weight") {
    // Build chart data - last 30 days
    const chartData = [];
    for (let i = 29; i >= 0; i--) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      const k = dateKey(d);
      chartData.push({ date: d, weight: state.weights[k] || null });
    }
    const weightsOnly = chartData.filter(d => d.weight !== null).map(d => d.weight);
    const minW = weightsOnly.length > 0 ? Math.min(...weightsOnly) : 0;
    const maxW = weightsOnly.length > 0 ? Math.max(...weightsOnly) : 0;
    const range = maxW - minW;
    const padMin = range > 0 ? minW - range * 0.2 : minW - 2;
    const padMax = range > 0 ? maxW + range * 0.2 : maxW + 2;
    const chartHeight = 140;

    const allSorted = [...weightEntries].reverse();

    return (
      <div style={sc}>
        <PageHeader
          onBack={() => setView("home")}
          center={<div style={{fontSize:16, fontWeight:700}}>Вес</div>}
        />

        <div style={{padding:`${SP.md}px ${SP.lg}px 40px`}}>
          {/* Current weight card */}
          <div style={{...S.card, padding:SP.xl, marginBottom:SP.md, textAlign:"center"}}>
            <div style={{fontSize:11, color:C.textDim, textTransform:"uppercase", letterSpacing:1.2, fontWeight:700, marginBottom:SP.sm}}>
              {latestWeight ? "Последний вес" : "Ещё не записан"}
            </div>
            {latestWeight ? (
              <>
                <div style={{fontSize:48, fontWeight:800, color:C.text, lineHeight:1, fontVariantNumeric:"tabular-nums", letterSpacing:-1}}>
                  {latestWeight[1]}
                  <span style={{fontSize:18, color:C.textDim, fontWeight:600, marginLeft:6}}>кг</span>
                </div>
                <div style={{fontSize:12, color:C.textDim, marginTop:SP.sm, fontWeight:500}}>
                  {(() => {
                    const d = parseKey(latestWeight[0]);
                    return sameDay(d, new Date()) ? "сегодня" : `${d.getDate()} ${MONTHS_SHORT[d.getMonth()]}`;
                  })()}
                </div>
              </>
            ) : (
              <div style={{fontSize:36, opacity:0.3, lineHeight:1, margin:`${SP.sm}px 0`}}>⚖️</div>
            )}
            <button
              onClick={() => setEditingWeight(new Date())}
              style={{
                marginTop:SP.lg,
                background:C.accent,
                color:"#fff",
                padding:"12px 24px",
                borderRadius:12,
                fontSize:14,
                fontWeight:700,
                display:"inline-flex",
                alignItems:"center",
                gap:6,
                boxShadow:`0 4px 12px ${C.accentSoft}`
              }}>
              <Icon name="plus" size={16} color="#fff" stroke={2.5}/>
              Записать вес
            </button>
          </div>

          {/* Chart */}
          {weightsOnly.length > 1 && (
            <div style={{...S.card, padding:SP.lg, marginBottom:SP.md}}>
              <div style={{fontSize:11, color:C.textDim, textTransform:"uppercase", letterSpacing:1.2, fontWeight:700, marginBottom:SP.md}}>
                Последние 30 дней
              </div>
              <WeightChart
                data={chartData}
                height={chartHeight}
                minVal={padMin}
                maxVal={padMax}
              />
              <div style={{display:"flex", justifyContent:"space-between", marginTop:SP.sm, fontSize:10, color:C.textDim, fontVariantNumeric:"tabular-nums"}}>
                <span>30 дней назад</span>
                <span>Сегодня</span>
              </div>

              {/* Min/Max */}
              <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:SP.sm, marginTop:SP.md, paddingTop:SP.md, borderTop:`1px solid ${C.borderSoft}`}}>
                <div>
                  <div style={{fontSize:10, color:C.textDim, fontWeight:600, textTransform:"uppercase", letterSpacing:0.5}}>Мин</div>

                        alignItems:"center",

        <div style={{padding:`${SP.md}px ${SP.lg}px 40px`}}>

            </div>
            <div style={{...S.card, padding:SP.lg, textAlign:"center"}}>
              <div style={{fontSize:28, marginBottom:4}}>🌸</div>
              <div style={{fontSize:28, fontWeight:800, color:C.accentDark, lineHeight:1, fontVariantNumeric:"tabular-nums"}}>{totalCount}</div>
              <div style={{fontSize:10, color:C.textDim, textTransform:"uppercase", letterSpacing:1, fontWeight:600, marginTop:6}}>

            </div>
            <div style={{display:"grid", gridTemplateColumns:"repeat(7, 1fr)", gap:6, alignItems:"end", height:90}}>

            <div style={{display:"grid", gridTemplateColumns:"repeat(7, 1fr)", gap:6, marginTop:8}}>

                const isToday = sameDay(d.date, new Date());

                </div>
                <div style={{fontSize:13, color:C.textDim, fontVariantNumeric:"tabular-nums"}}>

                </div>
              </div>
              <div style={{display:"grid", gridTemplateColumns:"repeat(5, 1fr)", gap:SP.sm}}>

              width:56, height:56, borderRadius:28,

              {todayWorkouts.length === 0 ? (

                <div style={{fontSize:22, fontWeight:800, color:"#fff"}}>{todayWorkouts.length}</div>

          </div>
        </button>
      </div>

      {/* QUICK ACTIONS: Mood + Weight */}
      <div style={{padding:`0 ${SP.lg}px`, display:"grid", gridTemplateColumns:"1fr 1fr", gap:SP.sm, marginBottom:SP.md}}>
        <button onClick={() => setEditingMood(new Date())} style={{...S.quickCard, textAlign:"left"}}>
          <div style={{display:"flex", alignItems:"center", gap:SP.sm, marginBottom:6}}>
            <span style={{fontSize:22}}>
              {todayMood ? MOOD_LABELS[todayMood].emoji : "🙂"}

          <div style={{fontSize:14, fontWeight:700, color:C.text, lineHeight:1.2}}>

        <button onClick={() => setView("weight")} style={{...S.quickCard, textAlign:"left"}}>
          <div style={{display:"flex", alignItems:"center", gap:SP.sm, marginBottom:6}}>
            <span style={{fontSize:22}}>⚖️</span>

      {/* CALENDAR */}
      <div style={{padding:`0 ${SP.lg}px`, marginBottom:SP.md}}>

          <div style={{display:"grid", gridTemplateColumns:"repeat(7, 1fr)", gap:4}}>

              const dk = dateKey(d);
              const workouts = state.workouts[dk] || [];
              const count = workouts.length;
              const isToday = sameDay(d, new Date());
              const isFuture = d > now;
              const weekday = d.getDay();
              const isWeekend = weekday === 0 || weekday === 6;

              return (
                <button
                  key={i}
                  onClick={() => { setSelectedDate(d); setView("day"); }}
                  disabled={isFuture}
                  style={{
                    aspectRatio:"1/1",
                    display:"flex",
                    flexDirection:"column",
                    alignItems:"center",
                    justifyContent:"center",
                    gap:2,
                    background: count > 0 ? C.accent : (isToday ? C.accentSoft : "transparent"),
                    border: `1.5px solid ${isToday ? C.accent : "transparent"}`,
                    borderRadius:10,
                    color: count > 0 ? "#fff" : (isFuture ? C.textSoft : (isWeekend ? C.textDim : C.text)),
                    opacity: isFuture ? 0.4 : 1,
                    cursor: isFuture ? "default" : "pointer",
                    transition:"all .15s",
                    padding:2

                  <div style={{fontSize:14, fontWeight: count > 0 || isToday ? 700 : 500, lineHeight:1, fontVariantNumeric:"tabular-nums"}}>
                    {day}

        Сбросить всё
      </button>
      <div style={{height:40}}/>
    </div>
  );

// ═══ WEIGHT CHART ═══════════════════════════════════════════════════════════
function WeightChart({ data, height, minVal, maxVal }) {
  const validPoints = data.map((d, i) => ({ ...d, idx: i })).filter(d => d.weight !== null);
  if (validPoints.length < 2) {
    return (
      <div style={{height, display:"flex", alignItems:"center", justifyContent:"center", color:C.textDim, fontSize:13}}>
        Нужно минимум 2 замера для графика
      </div>
    );
  }

  const width = 100; // percent-based
  const range = maxVal - minVal || 1;
  const xStep = width / (data.length - 1);

  const getY = (w) => height - ((w - minVal) / range) * (height - 20) - 10;
  const getX = (i) => i * xStep;

  // Build smooth path
  let path = "";
  validPoints.forEach((p, i) => {
    const x = getX(p.idx);
    const y = getY(p.weight);
    if (i === 0) path += `M ${x} ${y}`;
    else {
      const prev = validPoints[i - 1];
      const prevX = getX(prev.idx);
      const prevY = getY(prev.weight);
      const cx1 = prevX + (x - prevX) / 2;
      const cx2 = prevX + (x - prevX) / 2;
      path += ` C ${cx1} ${prevY}, ${cx2} ${y}, ${x} ${y}`;
    }
  });

  // Area path (fill under line)
  const firstX = getX(validPoints[0].idx);
  const lastX = getX(validPoints[validPoints.length-1].idx);
  const areaPath = path + ` L ${lastX} ${height} L ${firstX} ${height} Z`;

  return (
    <svg viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none" style={{width:"100%", height, display:"block", overflow:"visible"}}>
      <defs>
        <linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={C.accent} stopOpacity="0.3"/>
          <stop offset="100%" stopColor={C.accent} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={areaPath} fill="url(#wg)"/>
      <path d={path} fill="none" stroke={C.accent} strokeWidth="2" vectorEffect="non-scaling-stroke" strokeLinecap="round" strokeLinejoin="round"/>
      {validPoints.map((p, i) => (
        <circle key={i} cx={getX(p.idx)} cy={getY(p.weight)} r="0.8" fill={C.accent} vectorEffect="non-scaling-stroke"/>
      ))}
    </svg>
  );
}

        borderRadius:12,
        background:C.accentSoft,
        display:"flex", alignItems:"center", justifyContent:"center",
        flexShrink:0,
        fontSize:22
      }}>
        {cat.emoji}
      </div>
      <div style={{flex:1, minWidth:0}}>
        <div style={{fontSize:15, fontWeight:700, color:C.text, marginBottom:2, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}>
          {workout.name || cat.name}
        </div>
        <div style={{fontSize:12, color:C.textDim, display:"flex", alignItems:"center", gap:6, flexWrap:"wrap"}}>
          {showDate && (
            <>
              <span>{showDate.getDate()} {MONTHS_SHORT[showDate.getMonth()]}</span>
              <span>·</span>
            </>
          )}
          {workout.duration && <span>{workout.duration} мин</span>}
          {workout.duration && workout.time && <span>·</span>}
          {workout.time && <span>{workout.time}</span>}
        </div>
      </div>
    </button>
  );
}

// ═══ WORKOUT FORM ═══════════════════════════════════════════════════════════
function WorkoutForm({ workout, date, onSave, onCancel, onDelete }) {
  const [name, setName] = useState(workout.name || "");
  const [category, setCategory] = useState(workout.category || "fitness");
  const [duration, setDuration] = useState(workout.duration || "");
  const [time, setTime] = useState(workout.time || "");
  const [notes, setNotes] = useState(workout.notes || "");

  const handleSave = () => {
    const w = { ...workout };
    if (workout.id) w.id = workout.id;
    w.name = name.trim() || CATEGORIES.find(c => c.id === category).name;
    w.category = category;
    w.duration = duration;
    w.time = time;
    w.notes = notes.trim();
    onSave(w);
  };

  return (
    <div style={sc}>
      <div style={{display:"grid", gridTemplateColumns:"36px 1fr 36px", alignItems:"center", padding:`${SP.md}px ${SP.lg}px`, gap:SP.md, background:C.bg, position:"sticky", top:0, zIndex:10}}>
        <button onClick={onCancel} style={S.iconButton}>
          <Icon name="close" size={18}/>
        </button>
        <div style={{textAlign:"center", minWidth:0}}>
          <div style={S.headLabel}>{workout.id ? "Редактировать" : "Новая тренировка"}</div>
          <div style={S.headSub}>{date.getDate()} {MONTHS[date.getMonth()].toLowerCase()}</div>
        </div>
        <div/>
      </div>

      <div style={{padding:`${SP.md}px ${SP.lg}px ${SP.xl}px`}}>
        <div style={{marginBottom:SP.md}}>
          <label style={S.fieldLabel}>Тип тренировки</label>
          <div style={{display:"grid", gridTemplateColumns:"repeat(2, 1fr)", gap:SP.sm}}>
            {CATEGORIES.map(c => {
              const selected = c.id === category;
              return (
                <button
                  key={c.id}
                  onClick={() => setCategory(c.id)}
                  style={{
                    display:"flex",
                    flexDirection:"column",
                    alignItems:"center",
                    justifyContent:"center",
                    gap:8,
                    paddingTop:18, paddingBottom:16,
                    background: selected ? C.accent : C.card,
                    border: `1.5px solid ${selected ? C.accent : C.border}`,
                    borderRadius:14,
                    color: selected ? "#fff" : C.text,
                    transition:"all .15s"
                  }}>
                  <div style={{fontSize:32, lineHeight:1}}>{c.emoji}</div>
                  <div style={{fontSize:13, fontWeight:700, lineHeight:1}}>{c.name}</div>
                </button>
              );
            })}
          </div>
        </div>

        <div style={{marginBottom:SP.md}}>
          <label style={S.fieldLabel}>Название (необязательно)</label>
          <input
            type="text"
            value={name}
            onChange={e => setName(e.target.value)}
            placeholder={CATEGORIES.find(c => c.id === category).name}
            style={S.input}
          />
        </div>

        <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:SP.sm, marginBottom:SP.md}}>
          <div>
            <label style={S.fieldLabel}>Длительность</label>
            <div style={{position:"relative"}}>
              <input
                type="number"
                inputMode="numeric"
                value={duration}
                onChange={e => setDuration(e.target.value)}
                placeholder="60"
                style={{...S.input, paddingRight:40}}
              />
              <span style={{position:"absolute", right:14, top:"50%", transform:"translateY(-50%)", fontSize:12, color:C.textDim, fontWeight:500, pointerEvents:"none"}}>мин</span>
            </div>
          </div>
          <div>
            <label style={S.fieldLabel}>Время</label>
            <input
              type="time"
              value={time}
              onChange={e => setTime(e.target.value)}
              style={S.input}
            />
          </div>
        </div>

        <div style={{marginBottom:SP.xl}}>
          <label style={S.fieldLabel}>Заметка</label>
          <textarea
            value={notes}
            onChange={e => setNotes(e.target.value)}
            placeholder="Что было, как себя чувствовала..."
            rows={3}
            style={{...S.input, minHeight:80, lineHeight:1.5, paddingTop:12}}
          />
        </div>

        <button
          onClick={handleSave}
          style={{
            width:"100%",
            background:C.accent,
            color:"#fff",
            padding:"16px",
            borderRadius:14,
            fontSize:15,
            fontWeight:700,
            letterSpacing:0.3,
            display:"flex",
            alignItems:"center",
            justifyContent:"center",
            gap:8,
            marginBottom:SP.sm,
            boxShadow:`0 4px 14px ${C.accentSoft}`
          }}>
          <Icon name="check" size={18} color="#fff" stroke={2.5}/>
          Сохранить
        </button>

        {onDelete && (
          <button
            onClick={() => { if(confirm("Удалить эту тренировку?")) onDelete(); }}
            style={{
              width:"100%",
              background:"transparent",
              color:C.textDim,
              padding:"12px",
              fontSize:13,
              fontWeight:500,
              display:"flex",
              alignItems:"center",
              justifyContent:"center",
              gap:6
            }}>
            <Icon name="trash" size={14} color={C.textDim}/>
            Удалить
          </button>
        )}
      </div>
    </div>
  );
}

// ═══ WEIGHT FORM ═══════════════════════════════════════════════════════════
function WeightForm({ date, currentValue, onSave, onCancel, onDelete }) {
  const [value, setValue] = useState(currentValue ? String(currentValue) : "");

  const handleSave = () => {
    const num = parseFloat(value);
    if (!isNaN(num) && num > 0) onSave(num);
  };

  return (
    <div style={sc}>
      <div style={{display:"grid", gridTemplateColumns:"36px 1fr 36px", alignItems:"center", padding:`${SP.md}px ${SP.lg}px`, gap:SP.md, background:C.bg, position:"sticky", top:0, zIndex:10}}>
        <button onClick={onCancel} style={S.iconButton}>
          <Icon name="close" size={18}/>
        </button>
        <div style={{textAlign:"center", minWidth:0}}>
          <div style={S.headLabel}>Вес</div>
          <div style={S.headSub}>{sameDay(date, new Date()) ? "Сегодня" : `${date.getDate()} ${MONTHS[date.getMonth()].toLowerCase()}`}</div>
        </div>
        <div/>
      </div>

      <div style={{padding:`${SP.xxl}px ${SP.lg}px ${SP.xl}px`, display:"flex", flexDirection:"column", alignItems:"center"}}>
        <div style={{fontSize:48, marginBottom:SP.lg}}>⚖️</div>

        <div style={{...S.card, width:"100%", padding:SP.xl, marginBottom:SP.md}}>
          <label style={{...S.fieldLabel, textAlign:"center", marginBottom:SP.md}}>Сколько ты весишь?</label>
          <div style={{display:"flex", alignItems:"baseline", justifyContent:"center", gap:SP.sm}}>
            <input
              type="number"
              inputMode="decimal"
              step="0.1"
              value={value}
              onChange={e => setValue(e.target.value)}
              placeholder="58.5"
              autoFocus
              style={{
                background:"transparent",
                border:"none",
                borderBottom:`2px solid ${C.border}`,
                fontSize:48,
                fontWeight:800,
                color:C.text,
                textAlign:"center",
                width:180,
                padding:"6px 0",
                fontVariantNumeric:"tabular-nums",
                outline:"none"
              }}
            />
            <span style={{fontSize:18, color:C.textDim, fontWeight:600}}>кг</span>
          </div>
        </div>

        <button
          onClick={handleSave}
          disabled={!value || parseFloat(value) <= 0}
          style={{
            width:"100%",
            background: value && parseFloat(value) > 0 ? C.accent : C.borderSoft,
            color: value && parseFloat(value) > 0 ? "#fff" : C.textSoft,
            padding:"16px",
            borderRadius:14,
            fontSize:15,
            fontWeight:700,
            letterSpacing:0.3,
            display:"flex",
            alignItems:"center",
            justifyContent:"center",
            gap:8,
            marginBottom:SP.sm,
            boxShadow: value && parseFloat(value) > 0 ? `0 4px 14px ${C.accentSoft}` : "none",
            transition:"all .2s"
          }}>
          <Icon name="check" size={18} color={value && parseFloat(value) > 0 ? "#fff" : C.textSoft} stroke={2.5}/>
          Сохранить
        </button>

        {onDelete && (
          <button
            onClick={() => { if(confirm("Удалить запись?")) onDelete(); }}
            style={{
              width:"100%",
              background:"transparent",
              color:C.textDim,
              padding:"12px",
              fontSize:13,
              fontWeight:500,
              display:"flex",
              alignItems:"center",
              justifyContent:"center",
              gap:6
            }}>
            <Icon name="trash" size={14} color={C.textDim}/>
            Удалить
          </button>
        )}
      </div>
    </div>
  );
}

// ═══ MOOD FORM ═══════════════════════════════════════════════════════════
function MoodForm({ date, currentValue, onSave, onCancel, onDelete }) {
  const [value, setValue] = useState(currentValue || 3);
  const label = MOOD_LABELS[value];

  return (
    <div style={sc}>
      <div style={{display:"grid", gridTemplateColumns:"36px 1fr 36px", alignItems:"center", padding:`${SP.md}px ${SP.lg}px`, gap:SP.md, background:C.bg, position:"sticky", top:0, zIndex:10}}>
        <button onClick={onCancel} style={S.iconButton}>
          <Icon name="close" size={18}/>
        </button>
        <div style={{textAlign:"center", minWidth:0}}>
          <div style={S.headLabel}>Настроение</div>
          <div style={S.headSub}>{sameDay(date, new Date()) ? "Сегодня" : `${date.getDate()} ${MONTHS[date.getMonth()].toLowerCase()}`}</div>
        </div>
        <div/>
      </div>

      <div style={{padding:`${SP.xxl}px ${SP.lg}px ${SP.xl}px`, display:"flex", flexDirection:"column", alignItems:"center"}}>
        {/* Big emoji */}
        <div style={{fontSize:96, lineHeight:1, marginBottom:SP.md, transition:"transform .2s", animation:"fadeIn .3s"}}>
          {label.emoji}
        </div>
        <div style={{fontSize:24, fontWeight:700, color:C.text, marginBottom:SP.xxl}}>
          {label.label}
        </div>

        {/* Slider */}
        <div style={{...S.card, width:"100%", padding:SP.xl, marginBottom:SP.md}}>
          <div style={{display:"flex", justifyContent:"space-between", marginBottom:SP.sm, fontSize:22, lineHeight:1}}>
            {[1,2,3,4,5].map(v => (
              <button
                key={v}
                onClick={() => setValue(v)}
                style={{
                  opacity: v === value ? 1 : 0.35,
                  transform: v === value ? "scale(1.15)" : "scale(1)",
                  transition:"all .2s",
                  background:"none",
                  padding:4
                }}>
                {MOOD_LABELS[v].emoji}
              </button>
            ))}
          </div>
          <input
            type="range"
            min="1"
            max="5"
            step="1"
            value={value}
            onChange={e => setValue(parseInt(e.target.value))}
            style={{width:"100%", marginTop:SP.sm}}
          />
          <div style={{display:"flex", justifyContent:"space-between", marginTop:6, fontSize:10, color:C.textDim, fontWeight:600}}>
            <span>Грустно</span>
            <span>Супер</span>
          </div>
        </div>

        <button
          onClick={() => onSave(value)}
          style={{
            width:"100%",
            background:C.accent,
            color:"#fff",
            padding:"16px",
            borderRadius:14,
            fontSize:15,
            fontWeight:700,
            letterSpacing:0.3,
            display:"flex",
            alignItems:"center",
            justifyContent:"center",
            gap:8,
            marginBottom:SP.sm,
            boxShadow:`0 4px 14px ${C.accentSoft}`
          }}>
          <Icon name="check" size={18} color="#fff" stroke={2.5}/>
          Сохранить
        </button>

        {onDelete && (
          <button
            onClick={() => { if(confirm("Удалить запись?")) onDelete(); }}
            style={{
              width:"100%",
              background:"transparent",
              color:C.textDim,
              padding:"12px",
              fontSize:13,
              fontWeight:500,
              display:"flex",
              alignItems:"center",
              justifyContent:"center",
              gap:6
            }}>
            <Icon name="trash" size={14} color={C.textDim}/>
            Удалить
          </button>
        )}
      </div>
    </div>
  );
}

}
